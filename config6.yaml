# Flclash (Mihomo) 终极本地合并配置 (绝对稳妥版)
# ==========================================

# 1. 代理集合 (让软件自己去拉取你的两个订阅)
proxy-providers:
  Sub1_主力:
    type: http
    url: "https://dy.008816.xyz/link1"
    interval: 3600
    health-check:
      enable: true
      url: "http://www.google.com/generate_204"
      interval: 300
  Sub2_备用:
    type: http
    url: "https://xship.top/v1/subscribe?starlink=34RhFnnyTjFVqyC-CMuslgzB"
    interval: 3600
    health-check:
      enable: true
      url: "http://www.google.com/generate_204"
      interval: 300

# 2. 策略组 (智能筛选与分类)
proxy-groups:
  - name: "🧠 Gemini专属"
    type: select
    use: &all-subs
      - Sub1_主力
      - Sub2_备用
    filter: "^(?!.*(港|HK|Hong)).*Gemini.*"
    proxies:
      - "🤖 严格AI"

  - name: "🤖 严格AI"
    type: select
    use: *all-subs
    filter: "^(?!.*(港|HK|Hong)).*(GPT|解锁|Chat|原生|Grok|奈飞|Netflix|流媒体|家宽|住宅|ISP).*"
    proxies:
      - "🇺🇸 AI-US"
      - "🇸🇬 AI-SG"
      - "🇯🇵 AI-JP"

  - name: "🔍 谷歌服务"
    type: select
    proxies:
      - "🇺🇸 AI-US"
      - "🇸🇬 AI-SG"
      - "🇯🇵 AI-JP"

  - name: "📱 Telegram"
    type: url-test
    use: *all-subs
    url: "http://www.google.com/generate_204"
    interval: 300

  - name: "🇺🇸 AI-US"
    type: url-test
    use: *all-subs
    filter: "(?i)(美国|US|United States)"
    url: "http://www.google.com/generate_204"
    interval: 300

  - name: "🇸🇬 AI-SG"
    type: url-test
    use: *all-subs
    filter: "(?i)(新加坡|SG|Singapore)"
    url: "http://www.google.com/generate_204"
    interval: 300

  - name: "🇯🇵 AI-JP"
    type: url-test
    use: *all-subs
    filter: "(?i)(日本|JP|Japan)"
    url: "http://www.google.com/generate_204"
    interval: 300

  - name: "📹 YouTube"
    type: url-test
    use: *all-subs
    url: "http://www.youtube.com/generate_204"
    interval: 300

  - name: "🛑 故障转移"
    type: fallback
    use: *all-subs
    url: "http://www.google.com/generate_204"
    interval: 300

  - name: "🎯 全球直连"
    type: select
    proxies:
      - DIRECT

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "📹 YouTube"
      - "🎯 全球直连"
      - "🔍 谷歌服务"
      - "🛑 故障转移"

