    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Telegram.list
    interval: 86400


# -----------------------------
# 分流规则
# -----------------------------
rules:

  - "DOMAIN,u.pcloud.link,🎯 全球直连"
  - "DOMAIN-SUFFIX,pcloud.com,🎯 全球直连"
  - "DOMAIN-SUFFIX,baidu.com,🎯 全球直连"

  - "RULE-SET,LocalAreaNetwork,🎯 全球直连"
  - "RULE-SET,UnBan,🎯 全球直连"
  - "RULE-SET,GoogleCN,🎯 全球直连"

  - "RULE-SET,YouTubeRule,📹 YouTube"
  - "RULE-SET,PornRule,📹 YouTube"
  - "RULE-SET,GithubRule,📹 YouTube"

  - "DOMAIN-SUFFIX,gemini.google.com,🧠 Gemini专属"

  - "RULE-SET,OpenAiRule,🤖 严格AI"
  - "DOMAIN-SUFFIX,grok.com,🤖 严格AI"
  - "DOMAIN-SUFFIX,claude.ai,🤖 严格AI"

  - "RULE-SET,TelegramRule,📱 Telegram"

  - "GEOIP,CN,🎯 全球直连"
  - "MATCH,🐟 漏网之鱼"
