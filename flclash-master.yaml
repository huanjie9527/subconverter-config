# ===============================
# FlClash 超稳定安全版
# ===============================

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false

proxy-providers:
  Sub1:
    type: http
    url: https://dy.008816.xyz/link1
    interval: 3600
    health-check:
      enable: true
      url: http://www.google.com/generate_204
      interval: 300

  Sub2:
    type: http
    url: https://xship.top/v1/subscribe?starlink=34RhFnnyTjFVqyC-CMuslgzB
    interval: 3600
    health-check:
      enable: true
      url: http://www.google.com/generate_204
      interval: 300


proxy-groups:

  - name: Gemini
    type: select
    use:
      - Sub1
      - Sub2

  - name: AI
    type: select
    use:
      - Sub1
      - Sub2

  - name: YouTube
    type: url-test
    use:
      - Sub1
      - Sub2
    url: http://www.youtube.com/generate_204
    interval: 300

  - name: Telegram
    type: url-test
    use:
      - Sub1
      - Sub2
    url: http://www.google.com/generate_204
    interval: 300

  - name: DIRECT-OUT
    type: select
    proxies:
      - DIRECT

  - name: AUTO
    type: fallback
    use:
      - Sub1
      - Sub2
    url: http://www.google.com/generate_204
    interval: 300


rule-providers:

  LocalAreaNetwork:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
    interval: 86400

  OpenAiRule:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
    interval: 86400

  TelegramRule:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Telegram.list
    interval: 86400


rules:

  - "RULE-SET,LocalAreaNetwork,DIRECT-OUT"
  - "RULE-SET,OpenAiRule,AI"
  - "RULE-SET,TelegramRule,Telegram"
  - "DOMAIN-SUFFIX,youtube.com,YouTube"
  - "GEOIP,CN,DIRECT-OUT"
  - "MATCH,AUTO"
