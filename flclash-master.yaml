# ==========================================
# FlClash (Mihomo) 稳定完整版配置
# ==========================================

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false

# -----------------------------
# 代理订阅
# -----------------------------
proxy-providers:
  Sub1_主力:
    type: http
    url: https://dy.008816.xyz/link1
    interval: 3600
    health-check:
      enable: true
      url: http://www.google.com/generate_204
      interval: 300

  Sub2_备用:
    type: http
    url: https://xship.top/v1/subscribe?starlink=34RhFnnyTjFVqyC-CMuslgzB
    interval: 3600
    health-check:
      enable: true
      url: http://www.google.com/generate_204
      interval: 300


# -----------------------------
# 策略组
# -----------------------------
proxy-groups:

  - name: "🧠 Gemini专属"
    type: select
    use:
      - Sub1_主力
      - Sub2_备用
    filter: '^(?!.*(港|HK|Hong)).*Gemini.*'
    proxies:
      - "🤖 严格AI"

  - name: "🤖 严格AI"
    type: select
    use:
      - Sub1_主力
      - Sub2_备用
    filter: '^(?!.*(港|HK|Hong)).*(GPT|Chat|Grok|Claude|解锁|原生|Netflix|流媒体|家宽|住宅|ISP).*'
    proxies:
      - "🇺🇸 AI-US"
      - "🇸🇬 AI-SG"
      - "🇯🇵 AI-JP"

  - name: "🔍 谷歌服务"
    type: select
    proxies:
      - "🇺🇸 AI-US"
      - "🇸🇬 AI-SG"
      - "🇯🇵 AI-JP"

  - name: "📹 YouTube"
    type: url-test
    use:
      - Sub1_主力
      - Sub2_备用
    url: http://www.youtube.com/generate_204
    interval: 300

  - name: "📱 Telegram"
    type: url-test
    use:
      - Sub1_主力
      - Sub2_备用
    url: http://www.google.com/generate_204
    interval: 300

  - name: "🇺🇸 AI-US"
    type: url-test
    use:
      - Sub1_主力
      - Sub2_备用
    filter: '(?i)(美国|US|United States)'
    url: http://www.google.com/generate_204
    interval: 300

  - name: "🇸🇬 AI-SG"
    type: url-test
    use:
      - Sub1_主力
      - Sub2_备用
    filter: '(?i)(新加坡|SG|Singapore)'
    url: http://www.google.com/generate_204
    interval: 300

  - name: "🇯🇵 AI-JP"
    type: url-test
    use:
      - Sub1_主力
      - Sub2_备用
    filter: '(?i)(日本|JP|Japan)'
    url: http://www.google.com/generate_204
    interval: 300

  - name: "🛑 故障转移"
    type: fallback
    use:
      - Sub1_主力
      - Sub2_备用
    url: http://www.google.com/generate_204
    interval: 300

  - name: "🎯 全球直连"
    type: select
    proxies:
      - DIRECT

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "📹 YouTube"
      - "🎯 全球直连"
      - "🔍 谷歌服务"
      - "🛑 故障转移"


# -----------------------------
# 远程规则集
# -----------------------------
rule-providers:

  LocalAreaNetwork:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
    interval: 86400

  UnBan:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
    interval: 86400

  GoogleCN:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
    interval: 86400

  YouTubeRule:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
    interval: 86400

  PornRule:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Porn.list
    interval: 86400

  GithubRule:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Github.list
    interval: 86400

  OpenAiRule:
请在此输入文件内容
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
    interval: 86400

  TelegramRule:
    type: http
