[custom]
; --- 基础设置 ---
enable_rule_generator=true
overwrite_original_rules=true

; =========================================================
; 🛑 第一优先级：自定义直连规则 (必须放在最上面！)
; ❗ 修正说明：手动规则必须加 [] 前缀才能生效
; =========================================================

; [pCloud 强制直连]
ruleset=🎯 全球直连,[]DOMAIN,u.pcloud.link
ruleset=🎯 全球直连,[]DOMAIN,pcdn-u.pcloud.com
ruleset=🎯 全球直连,[]DOMAIN,api.pcloud.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,pcloud.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,pcloud.link
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,pclouddns.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,p-cdn.com
ruleset=🎯 全球直连,[]DOMAIN-KEYWORD,pcloud

; [百度系直连]
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,baidu.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,baidupcs.com

; [讯飞系直连]
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,iflytek.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,xfyun.cn
ruleset=🎯 全球直连,[]DOMAIN-KEYWORD,iflytek


; =========================================================
; ☁️ 第二优先级：远程规则集 (URL 不需要加 [])
; =========================================================

; --- 1. 🎯 全球直连 (局域网/去广告/国内IP) ---
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list

; --- 2. 📹 YouTube (含 Porn, GitHub, X/Twitter) ---
ruleset=📹 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=📹 YouTube,[]DOMAIN-SUFFIX,youtube.com
ruleset=📹 YouTube,[]DOMAIN-SUFFIX,googlevideo.com
ruleset=📹 YouTube,[]DOMAIN-SUFFIX,ytimg.com
; X (Twitter)
ruleset=📹 YouTube,[]DOMAIN-SUFFIX,twitter.com
ruleset=📹 YouTube,[]DOMAIN-SUFFIX,x.com
ruleset=📹 YouTube,[]DOMAIN-SUFFIX,t.co
ruleset=📹 YouTube,[]DOMAIN-SUFFIX,twimg.com
ruleset=📹 YouTube,[]DOMAIN-KEYWORD,twitter
; Porn & Github
ruleset=📹 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Porn.list
ruleset=📹 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Github.list

; --- 3. 💬 AI ---
ruleset=💬 AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=💬 AI,[]DOMAIN-SUFFIX,gemini.google.com
ruleset=💬 AI,[]DOMAIN-SUFFIX,bard.google.com
ruleset=💬 AI,[]DOMAIN-SUFFIX,generativelanguage.googleapis.com
ruleset=💬 AI,[]DOMAIN-SUFFIX,grok.com
ruleset=💬 AI,[]DOMAIN-SUFFIX,x.ai
ruleset=💬 AI,[]DOMAIN-SUFFIX,claude.ai
ruleset=💬 AI,[]DOMAIN-SUFFIX,anthropic.com
ruleset=💬 AI,[]DOMAIN-SUFFIX,google.com

; --- 4. 📱 Telegram ---
ruleset=📱 Telegram,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Telegram.list

; --- 5. 兜底规则 ---
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🎯 全球直连,[]GEOIP,LAN
ruleset=🐟 漏网之鱼,[]FINAL


; =========================================================
; 🚦 策略组配置
; =========================================================

; 1. YouTube (自动优选全节点) - ⚠️ 提示：请勿手动点击此组内的具体节点，否则会破坏自动切换
custom_proxy_group=📹 YouTube`url-test`.*`http://www.youtube.com/generate_204`300,50

; 2. Telegram (自动优选全节点) - 已修复：使用 Google 测速，解决全红问题
custom_proxy_group=📱 Telegram`url-test`.*`http://www.google.com/generate_204`300,50

; --- AI 核心分组 ---
custom_proxy_group=🇺🇸 AI-US`url-test`(美国|US|United States)`http://www.google.com/generate_204`300,50
custom_proxy_group=🇸🇬 AI-SG`url-test`(新加坡|SG|Singapore)`http://www.google.com/generate_204`300,50
custom_proxy_group=🇯🇵 AI-JP`url-test`(日本|JP|Japan)`http://www.google.com/generate_204`300,50
; AI 主组是 select，你可以在这里手动切换大区，这不会破坏子组的自动测速
custom_proxy_group=💬 AI`select`[]🇺🇸 AI-US`[]🇸🇬 AI-SG`[]🇯🇵 AI-JP

; --- 兜底与入口 ---
custom_proxy_group=🛑 故障转移`fallback`.*`http://www.google.com/generate_204`300,50
custom_proxy_group=🎯 全球直连`select`[]DIRECT

; [重点修正] 漏网之鱼：将 📹 YouTube 放在第一位，未匹配流量默认直接走 YouTube 组的自动优选
custom_proxy_group=🐟 漏网之鱼`select`[]📹 YouTube`[]🎯 全球直连`[]💬 AI`[]🛑 故障转移
